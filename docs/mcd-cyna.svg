  <rect x="748" y="463" width="104" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="800" y="480" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">porte sur</text>

