    <rect x="1490" y="340" width="220" height="120" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="1490" y="340" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="1490" y="365" width="220" height="7" fill="#1e3a8a"/>
    <text x="1600" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">UTILISATEUR</text>
    <text x="1505" y="392" font-size="12" fill="#0f172a">· rôle</text>
    <text x="1505" y="412" font-size="12" fill="#0f172a">· statut</text>
  </g>

