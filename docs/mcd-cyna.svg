  <rect x="345" y="373" width="110" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="400" y="390" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">regroupe</text>

  <!-- 5. PRODUIT — a pour — TARIF @ (400, 715) -->
  <rect x="360" y="703" width="80" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="400" y="720" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">a pour</text>

  <!-- 6. UTIL — souscrit — ABONNEMENT @ (1300, 550) -->
  <rect x="1252" y="538" width="96" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="1300" y="555" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">souscrit</text>

  <!-- 7. ABONNEMENT — porte sur — TARIF @ (600, 790) -->
  <rect x="548" y="778" width="104" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="600" y="795" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">porte sur</text>

  <!-- 8. UTIL — possède — ADRESSE @ (1600, 550) -->
  <rect x="1555" y="538" width="90" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="1600" y="555" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">possède</text>

