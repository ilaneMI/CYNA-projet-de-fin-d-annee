    <text x="905" y="712" font-size="12" fill="#0f172a">· résiliation programmée</text>
    <text x="905" y="732" font-size="12" fill="#0f172a">· échéance courante</text>
  </g>

  <!-- MESSAGE DE CONTACT (isolé) -->
  <g id="ent-msg">
    <rect x="1490" y="910" width="220" height="130" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="1490" y="910" width="220" height="32" rx="8" fill="#475569"/>
    <rect x="1490" y="935" width="220" height="7" fill="#475569"/>
