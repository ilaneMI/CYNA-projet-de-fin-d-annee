  <!-- 1. UTIL (1,1) — passe — (0,N) COMMANDE -->
  <rect x="1497" y="322" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1514" y="336" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="1421" y="261" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1438" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>

