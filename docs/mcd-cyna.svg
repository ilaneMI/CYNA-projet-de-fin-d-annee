    <text x="1255" y="192" font-size="12" fill="#0f172a">· montant total payé</text>
    <text x="1255" y="212" font-size="12" fill="#0f172a">· statut</text>
    <text x="1255" y="232" font-size="12" fill="#0f172a">· date</text>
  </g>

