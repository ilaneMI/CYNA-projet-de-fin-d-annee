  <rect x="1235" y="253" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1252" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="1080" y="331" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1097" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,N</text>

