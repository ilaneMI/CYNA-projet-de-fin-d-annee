    <rect x="1490" y="665" width="220" height="7" fill="#1e3a8a"/>
    <text x="1600" y="661" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">ADRESSE</text>
    <text x="1505" y="692" font-size="12" fill="#0f172a">· ligne</text>
    <text x="1505" y="712" font-size="12" fill="#0f172a">· ville</text>
    <text x="1505" y="732" font-size="12" fill="#0f172a">· code postal</text>
    <text x="1505" y="752" font-size="12" fill="#0f172a">· pays</text>
