    <text x="1505" y="962" font-size="12" fill="#0f172a">· nom</text>
    <text x="1505" y="982" font-size="12" fill="#0f172a">· email</text>
    <text x="1505" y="1002" font-size="12" fill="#0f172a">· sujet</text>
    <text x="1505" y="1022" font-size="12" fill="#0f172a">· statut</text>
  </g>

  <!-- ============ ASSOCIATION BOXES (verb boxes on line midpoints) ============ -->

  <!-- 1. UTIL — passe — COMMANDE @ (1475, 300) -->
  <rect x="1430" y="288" width="90" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="1475" y="305" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">passe</text>

  <!-- 2. COMMANDE — contient — LIGNE @ (1175, 300) -->
  <rect x="1120" y="288" width="110" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
  <text x="1175" y="305" text-anchor="middle" font-size="12" font-weight="700" font-style="italic" fill="#1e3a8a">contient</text>

