<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1180" width="1800" height="1180" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <!-- Background -->
  <rect width="1800" height="1180" fill="#f8fafc"/>

  <!-- Title -->
  <text x="900" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">
    Modèle conceptuel de données (MCD) — CYNA
  </text>
  <text x="900" y="68" text-anchor="middle" font-size="14" fill="#64748b">
    Entités et associations métier · notation (min, max)
  </text>

  <!-- ============ ZONES ============ -->
  <g id="zone-catalogue">
    <rect x="60" y="130" width="760" height="860" rx="12" fill="#f0f9ff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="80" y="152" font-size="13" font-weight="700" fill="#0369a1">Domaine CATALOGUE</text>
  </g>

  <g id="zone-transaction">
    <rect x="880" y="130" width="840" height="700" rx="12" fill="#eef2ff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="900" y="152" font-size="13" font-weight="700" fill="#4338ca">Domaine CLIENT / TRANSACTION</text>
  </g>

  <g id="zone-support">
    <rect x="1470" y="880" width="260" height="180" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="1490" y="902" font-size="13" font-weight="700" fill="#475569">Domaine SUPPORT (isolé)</text>
  </g>

  <!-- ============ ASSOCIATION LINES (drawn first, behind boxes) ============ -->
  <!-- 1. UTIL — passe — COMMANDE -->
  <line x1="1600" y1="400" x2="1350" y2="200" stroke="#334155" stroke-width="1.5"/>
  <!-- 2. COMMANDE — contient — LIGNE -->
  <line x1="1350" y1="200" x2="1000" y2="400" stroke="#334155" stroke-width="1.5"/>
  <!-- 3. LIGNE — porte sur — PRODUIT -->
  <line x1="1000" y1="400" x2="600" y2="550" stroke="#334155" stroke-width="1.5"/>
  <!-- 4. CATEGORIE — regroupe — PRODUIT -->
  <line x1="200" y1="220" x2="600" y2="550" stroke="#334155" stroke-width="1.5"/>
  <!-- 5. PRODUIT — a pour — TARIF -->
  <line x1="600" y1="550" x2="200" y2="880" stroke="#334155" stroke-width="1.5"/>
  <!-- 6. UTIL — souscrit — ABONNEMENT -->
  <line x1="1600" y1="400" x2="1000" y2="700" stroke="#334155" stroke-width="1.5"/>
  <!-- 7. ABONNEMENT — porte sur — TARIF -->
  <line x1="1000" y1="700" x2="200" y2="880" stroke="#334155" stroke-width="1.5"/>
  <!-- 8. UTIL — possède — ADRESSE -->
  <line x1="1600" y1="400" x2="1600" y2="700" stroke="#334155" stroke-width="1.5"/>

  <!-- ============ ENTITIES ============ -->

  <!-- CATEGORIE -->
  <g id="ent-cat">
    <rect x="90" y="160" width="220" height="120" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="90" y="160" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="90" y="185" width="220" height="7" fill="#1e3a8a"/>
    <text x="200" y="181" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CATÉGORIE</text>
    <text x="105" y="212" font-size="12" fill="#0f172a">· nom</text>
    <text x="105" y="232" font-size="12" fill="#0f172a">· ordre d'affichage</text>
    <text x="105" y="252" font-size="12" fill="#0f172a">· actif</text>
  </g>

  <!-- PRODUIT (central) -->
  <g id="ent-prod">
    <rect x="490" y="490" width="220" height="130" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="490" y="490" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="490" y="515" width="220" height="7" fill="#1e3a8a"/>
    <text x="600" y="511" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PRODUIT</text>
    <text x="505" y="542" font-size="12" fill="#0f172a">· nom</text>
    <text x="505" y="562" font-size="12" fill="#0f172a">· description</text>
    <text x="505" y="582" font-size="12" fill="#0f172a">· disponibilité</text>
    <text x="505" y="602" font-size="12" fill="#0f172a">· priorité</text>
  </g>

  <!-- TARIF -->
  <g id="ent-tarif">
    <rect x="90" y="820" width="220" height="120" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="90" y="820" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="90" y="845" width="220" height="7" fill="#1e3a8a"/>
    <text x="200" y="841" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">TARIF</text>
    <text x="105" y="872" font-size="12" fill="#0f172a">· intervalle (mensuel / annuel)</text>
    <text x="105" y="892" font-size="12" fill="#0f172a">· montant</text>
  </g>

  <!-- LIGNE DE COMMANDE -->
  <g id="ent-ligne">
    <rect x="890" y="340" width="220" height="120" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="890" y="340" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="890" y="365" width="220" height="7" fill="#1e3a8a"/>
    <text x="1000" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">LIGNE DE COMMANDE</text>
    <text x="905" y="392" font-size="12" fill="#0f172a">· quantité</text>
    <text x="905" y="412" font-size="12" fill="#0f172a">· prix unitaire</text>
  </g>

  <!-- COMMANDE -->
  <g id="ent-cmd">
    <rect x="1240" y="140" width="220" height="120" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect x="1240" y="140" width="220" height="32" rx="8" fill="#1e3a8a"/>
    <rect x="1240" y="165" width="220" height="7" fill="#1e3a8a"/>
