  <rect x="865" y="437" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="882" y="451" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,N</text>
  <rect x="708" y="497" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="725" y="511" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>

  <!-- 4. CATEGORIE (1,1) — regroupe — (0,N) PRODUIT -->
  <rect x="305" y="303" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="322" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="463" y="443" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="480" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>

  <!-- 5. PRODUIT (1,1) — a pour — (1,N) TARIF -->
  <rect x="463" y="641" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="480" y="655" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="305" y="773" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="322" y="787" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,N</text>

  <!-- 6. UTIL (1,1) — souscrit — (0,N) ABONNEMENT -->
  <rect x="1435" y="467" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1452" y="481" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="1132" y="617" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1149" y="631" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>

  <!-- 7. ABONNEMENT (0,N) — porte sur — (1,1) TARIF -->
  <rect x="785" y="737" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="802" y="751" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>
  <rect x="385" y="827" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="402" y="841" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>

  <!-- 8. UTIL (1,1) — possède — (0,N) ADRESSE -->
  <rect x="1583" y="467" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1600" y="481" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1,1</text>
  <rect x="1583" y="617" width="34" height="18" rx="3" fill="#ffffff"/>
  <text x="1600" y="631" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>

  <!-- ============ LEGEND ============ -->
  <g id="legend">
    <rect x="60" y="1090" width="1680" height="70" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="1113" font-size="12" font-weight="700" fill="#0f172a">Légende</text>

    <rect x="80" y="1128" width="90" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
    <text x="125" y="1145" text-anchor="middle" font-size="11" font-weight="700" font-style="italic" fill="#1e3a8a">verbe</text>
    <text x="185" y="1145" font-size="11" fill="#334155">association (verbe métier)</text>

    <rect x="410" y="1131" width="34" height="18" rx="3" fill="#ffffff" stroke="#94a3b8"/>
    <text x="427" y="1145" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">0,N</text>
    <text x="460" y="1145" font-size="11" fill="#334155">cardinalité (min, max) — lecture « côté opposé » : combien de l'entité en face par occurrence de celle-ci</text>

    <text x="80" y="1145" font-size="11" fill="#334155" opacity="0"></text>

    <rect x="80" y="1128" width="90" height="24" rx="12" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5" opacity="0"/>

    <text x="80" y="1153" font-size="11" font-weight="700" fill="#0369a1" opacity="0"></text>

    <text x="80" y="1153" font-size="11" fill="#334155" opacity="0"></text>
  </g>
</svg>
