<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 970" width="1400" height="970" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="970" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">
    Flux d'autorisation administrateur (AAL2)
  </text>
  <text x="700" y="68" text-anchor="middle" font-size="14" fill="#64748b">
    Deux chemins parallèles — page (/admin/*) et API (/api/admin/*) — trois contrôles en cascade
  </text>

  <!-- ===================== START BOX ===================== -->
  <g id="start">
    <rect x="440" y="90" width="360" height="70" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="620" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#0c4a6e">
      Requête vers une ressource admin
    </text>
    <text x="620" y="140" text-anchor="middle" font-size="12" fill="#0369a1">
      /admin/* (page)   ou   /api/admin/* (route)
    </text>
  </g>

  <!-- start → D1 -->
  <line x1="620" y1="160" x2="620" y2="200" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== DECISION 1 ===================== -->
  <g id="d1">
    <polygon points="620,200 760,260 620,320 480,260" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="620" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
      Session
    </text>
    <text x="620" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
      authentifiée ?
    </text>
  </g>

  <!-- D1 → Fail 1 (NON, horizontal right) -->
  <line x1="760" y1="260" x2="890" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="806" y="243" width="38" height="20" rx="3" fill="#f8fafc"/>
  <text x="825" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">NON</text>

  <!-- ===================== FAILURE BOX 1 ===================== -->
  <g id="fail1">
    <rect x="890" y="210" width="460" height="100" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Sub-box PAGE -->
    <rect x="900" y="220" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1007" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">PAGE</text>
    <text x="1007" y="270" text-anchor="middle" font-size="12" fill="#0f172a">Redirection vers</text>
    <text x="1007" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">/login</text>
    <!-- Sub-box API -->
    <rect x="1125" y="220" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1232" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">API</text>
    <text x="1232" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">401</text>
    <text x="1232" y="288" text-anchor="middle" font-size="11" fill="#334155">authentication required</text>
  </g>

  <!-- D1 → D2 (OUI, vertical) -->
  <line x1="620" y1="320" x2="620" y2="430" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="602" y="365" width="36" height="20" rx="3" fill="#f8fafc"/>
  <text x="620" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">OUI</text>

  <!-- ===================== DECISION 2 ===================== -->
  <g id="d2">
    <polygon points="620,430 760,490 620,550 480,490" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="620" y="486" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
      Rôle administrateur ?
    </text>
    <text x="620" y="506" text-anchor="middle" font-size="12" font-style="italic" fill="#334155">
      (is_admin)
    </text>
  </g>

  <!-- D2 → Fail 2 -->
  <line x1="760" y1="490" x2="890" y2="490" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="806" y="473" width="38" height="20" rx="3" fill="#f8fafc"/>
  <text x="825" y="488" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">NON</text>

  <!-- ===================== FAILURE BOX 2 ===================== -->
  <g id="fail2">
    <rect x="890" y="440" width="460" height="100" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="900" y="450" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1007" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">PAGE</text>
    <text x="1007" y="500" text-anchor="middle" font-size="12" fill="#0f172a">Redirection</text>
    <text x="1007" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">(accès refusé)</text>

    <rect x="1125" y="450" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1232" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">API</text>
    <text x="1232" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">403</text>
    <text x="1232" y="518" text-anchor="middle" font-size="11" fill="#334155">admin required</text>
  </g>

  <!-- D2 → D3 (OUI) -->
  <line x1="620" y1="550" x2="620" y2="660" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="602" y="595" width="36" height="20" rx="3" fill="#f8fafc"/>
  <text x="620" y="610" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">OUI</text>

  <!-- ===================== DECISION 3 ===================== -->
  <g id="d3">
    <polygon points="620,660 760,720 620,780 480,720" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="620" y="716" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">
      Niveau AAL2 atteint ?
    </text>
    <text x="620" y="736" text-anchor="middle" font-size="12" font-style="italic" fill="#334155">
      (TOTP validé sur la session)
    </text>
  </g>

  <!-- D3 → Fail 3 -->
  <line x1="760" y1="720" x2="890" y2="720" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="806" y="703" width="38" height="20" rx="3" fill="#f8fafc"/>
  <text x="825" y="718" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">NON</text>

  <!-- ===================== FAILURE BOX 3 ===================== -->
  <g id="fail3">
    <rect x="890" y="670" width="460" height="100" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="900" y="680" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1007" y="703" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">PAGE</text>
    <text x="1007" y="728" text-anchor="middle" font-size="12" fill="#0f172a">Redirection vers</text>
    <text x="1007" y="746" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">/admin/verify (step-up TOTP)</text>

    <rect x="1125" y="680" width="215" height="80" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1232" y="703" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">API</text>
    <text x="1232" y="726" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">403 — aal2 required</text>
    <text x="1232" y="746" text-anchor="middle" font-size="10" fill="#334155">step_up_path: /admin/verify</text>
  </g>

  <!-- D3 → Success (OUI) -->
  <line x1="620" y1="780" x2="620" y2="840" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="602" y="800" width="36" height="20" rx="3" fill="#f8fafc"/>
  <text x="620" y="815" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">OUI</text>

  <!-- ===================== SUCCESS BOX ===================== -->
  <g id="success">
    <rect x="440" y="840" width="360" height="70" rx="10" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
    <text x="620" y="870" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">
      Accès accordé
    </text>
    <text x="620" y="892" text-anchor="middle" font-size="12" fill="#e0e7ff">
      200 — rendu de la page / réponse handler
    </text>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <g id="legend">
    <rect x="60" y="920" width="1280" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="943" font-size="11" fill="#334155">
      <tspan font-weight="700" fill="#0f172a">Légende :</tspan>
      <tspan dx="8">◇ décision  ·  ▭ étape / résultat  ·  chemin OUI = descend  ·  chemin NON = branche vers la droite  ·  chaque échec précise la réponse selon la nature de la ressource</tspan>
    </text>
  </g>
</svg>
