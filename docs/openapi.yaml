openapi: 3.0.3
info:
  title: CYNA — API interne
  version: "0.1.0"
  description: |
    Routes HTTP exposées par l'application Next.js de CYNA. Seules les routes
    réellement implémentées dans `src/app/api/**/route.ts` sont décrites.

    Authentification : cookie de session Supabase (`@supabase/ssr`,
    HTTP-only, SameSite=Lax). Le serveur ré-valide chaque requête via
    `supabase.auth.getUser()` (round-trip vers Supabase Auth).

    Les autres lectures/mutations métier passent **directement** par le
    SDK Supabase côté client (RLS + RPC) et ne sont pas couvertes par cette
    spec — elles ne sont pas des endpoints HTTP exposés par Next.

servers:
  - url: http://localhost:3000
    description: Développement local
  - url: https://cyna.example.com
    description: Production (placeholder)

tags:
  - name: Checkout
    description: Création de la session Stripe Checkout côté serveur.
  - name: Webhooks
    description: Réception des événements Stripe.
  - name: Admin — Produits
    description: Mutations CRUD produits, réservées aux admins.

paths:
  /api/checkout/session:
    post:
      tags: [Checkout]
      summary: Crée une session Stripe Checkout
      description: |
        Authentification requise. Le serveur résout `productSlug` +
        `subscriptionDuration` en `stripe_price_id` côté base ; le client
        n'envoie jamais ni montant, ni `stripe_price_id`. Retourne l'URL
        de la page hébergée Stripe.

        Mode `subscription`. `client_reference_id`, `metadata.user_id`
        et `subscription_data.metadata.user_id` sont tous renseignés à
        `user.id` ; le webhook ne fait jamais confiance à un user id
        venant du body.
      operationId: createCheckoutSession
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionRequest"
            examples:
              soc_monthly:
                summary: 1 abonnement mensuel SOC Essentiel
                value:
                  items:
                    - productSlug: soc-essentiel
                      subscriptionDuration: monthly
                      quantity: 1
                  billing:
                    firstName: Nathan
                    lastName: Arnaud
                    email: nathan.arnaud@example.com
                    address1: 10 rue de Penthievre
                    city: Paris
                    postalCode: "75008"
                    country: FR
      responses:
        "200":
          description: URL Stripe Checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: |
            JSON invalide, champs manquants, `quantity` invalide,
            `subscriptionDuration` hors-enum, billing manquant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Session non authentifiée.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: |
            Produit inconnu (slug introuvable) ou aucun prix actif pour
            la combinaison `(slug, subscriptionDuration)`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: |
            Erreur Supabase (lookup produit / prix), prix non encore seedé
            dans Stripe, ou Stripe Checkout n'a pas renvoyé d'URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: |
            Stripe n'a pas renvoyé de `session.url` (cas extrême).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Endpoint webhook Stripe
      description: |
        Reçoit les événements Stripe. Vérifie la signature HMAC sur le
        body brut. Implémente une idempotence triple : PK
        `stripe_events.id`, index UNIQUE partial
        `orders.stripe_checkout_session_id`, early-return dans
        `place_order_for_user`.

        Types d'événements gérés :
          * `checkout.session.completed` → création de la commande via
            `place_order_for_user`.
          * `customer.subscription.created`
          * `customer.subscription.updated`
          * `customer.subscription.deleted`
            (les trois → upsert via `upsert_subscription_from_stripe`).

        Tout autre type est ignoré (no-op) mais la ligne d'audit est
        conservée dans `stripe_events`.
      operationId: stripeWebhook
      parameters:
        - in: header
          name: stripe-signature
          required: true
          description: |
            Signature HMAC SHA-256 calculée par Stripe selon le
            `STRIPE_WEBHOOK_SECRET` du tunnel courant.
          schema:
            type: string
      requestBody:
        required: true
        description: Payload `Stripe.Event` brut. Voir docs Stripe.
        content:
          application/json:
            schema:
              type: object
              description: Stripe.Event — forme variable selon le type d'événement.
      responses:
        "200":
          description: |
            Événement reçu et traité (ou idempotent / no-op).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/WebhookReceived"
                  - $ref: "#/components/schemas/WebhookIdempotent"
        "400":
          description: |
            Signature manquante ou invalide. Pas d'insertion dans
            `stripe_events`. Stripe arrête de retenter au bout de
            quelques tentatives.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: |
            Soit `STRIPE_WEBHOOK_SECRET` non configuré (erreur env),
            soit handler interne qui throw (la ligne `stripe_events` est
            alors supprimée pour laisser la retry Stripe re-traiter).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        description: UUID Postgres du produit (`public.products.id`).
        schema:
          type: string
          format: uuid
    patch:
      tags: [Admin — Produits]
      summary: Met à jour partiellement un produit
      description: |
        Appelle la RPC `public.admin_update_product`. Tous les champs
        sont optionnels, NULL/absent = "ne pas changer". Validation
        serveur supplémentaire dans la RPC (codes 22023).

        Après succès, invalide les caches ISR : `/`, `/catalogue`,
        `/category/[id]`, `/product/[id]`.
      operationId: adminUpdateProduct
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductPatch"
            examples:
              toggle_active:
                summary: Soft-delete (désactiver)
                value: { is_active: false }
              rename_fr:
                summary: Renommer (FR)
                value:
                  name: { fr: "SOC Essentiel" }
                  description: { fr: "Nouvelle description du service." }
              change_availability:
                summary: Passer en rupture
                value: { availability: out_of_stock }
      responses:
        "200":
          description: Ligne `products` mise à jour (renvoyée).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ProductRow"
        "400":
          description: |
            JSON invalide ou validation RPC (errcode `22023`) — par
            exemple `availability` hors enum, `priority` hors [0..1000],
            `name` ne contenant ni `fr` ni `en` non vide.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
        "401":
          description: Session non authentifiée.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: |
            Le caller n'est pas admin (errcode `42501`,
            `forbidden: admin only`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
        "404":
          description: |
            Produit introuvable (errcode `P0002`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
        "500":
          description: Erreur Supabase non mappée.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
    delete:
      tags: [Admin — Produits]
      summary: Supprime définitivement un produit
      description: |
        Appelle la RPC `public.admin_delete_product`. Hard delete :
        CASCADE sur `product_images` et `prices` ; `order_items.product_id`
        passe à NULL (`ON DELETE SET NULL`) — l'historique des commandes
        est préservé avec le snapshot `product_name_snapshot`.

        Les Stripe Price objects côté Stripe ne sont pas supprimés.

        Pour cacher un produit du catalogue sans casser l'historique,
        préférer le soft delete (`PATCH … { is_active: false }`).

        Après succès, invalide les caches ISR (mêmes paths que PATCH).
      operationId: adminDeleteProduct
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Produit supprimé.
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
                    enum: [true]
        "401":
          description: Session non authentifiée.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: |
            Le caller n'est pas admin (errcode `42501`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
        "404":
          description: Produit introuvable (errcode `P0002`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }
        "500":
          description: Erreur Supabase non mappée.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorWithCode" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sb-<project-ref>-auth-token
      description: |
        Cookie HTTP-only posé par `@supabase/ssr` lors de la connexion.
        Le serveur ré-valide via `supabase.auth.getUser()` à chaque
        requête (round-trip Supabase, JWT signé).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ErrorWithCode:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          description: |
            Code SQLSTATE Postgres remonté par la RPC quand pertinent.
            Mapping HTTP :
              * `42501` → 403 (`forbidden: admin only`)
              * `P0002` → 404 (`not found`)
              * `22023` → 400 (validation)

    SubscriptionDuration:
      type: string
      enum: [monthly, annual, per_user]

    Availability:
      type: string
      enum: [in_stock, limited, out_of_stock]

    CheckoutItem:
      type: object
      required: [productSlug, subscriptionDuration, quantity]
      properties:
        productSlug:
          type: string
          description: Slug `public.products.slug` (citext).
        subscriptionDuration:
          $ref: "#/components/schemas/SubscriptionDuration"
        quantity:
          type: integer
          minimum: 1

    Billing:
      type: object
      required:
        - firstName
        - lastName
        - email
        - address1
        - city
        - postalCode
        - country
      properties:
        firstName:    { type: string }
        lastName:     { type: string }
        email:        { type: string, format: email }
        address1:     { type: string }
        address2:     { type: string, nullable: true }
        city:         { type: string }
        region:       { type: string, nullable: true }
        postalCode:   { type: string }
        country:      { type: string, description: Code ISO-2. }
        phone:        { type: string, nullable: true }

    CheckoutSessionRequest:
      type: object
      required: [items, billing]
      properties:
        items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CheckoutItem" }
        billing:
          $ref: "#/components/schemas/Billing"

    CheckoutSessionResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: |
            URL Stripe Checkout hébergée. Le client doit naviguer dessus
            (`window.location.assign(url)`).

    WebhookReceived:
      type: object
      required: [received]
      properties:
        received: { type: boolean, enum: [true] }

    WebhookIdempotent:
      type: object
      required: [received, idempotent]
      properties:
        received:   { type: boolean, enum: [true] }
        idempotent: { type: boolean, enum: [true] }

    JsonbI18n:
      type: object
      description: |
        Map i18n stockée en jsonb. Clé recommandée pour CYNA :
        `{ fr, en, ar, he }`. Au moins une clé non vide.
      additionalProperties:
        type: string

    ProductPatch:
      type: object
      description: |
        Tous les champs sont optionnels. Un champ absent (`undefined`)
        ou NULL signifie « ne pas modifier ». Les jsonb sont remplacés
        en bloc (pas de patch granulaire au niveau locale).
      properties:
        name:
          $ref: "#/components/schemas/JsonbI18n"
        description:
          $ref: "#/components/schemas/JsonbI18n"
        specs:
          type: object
          description: jsonb libre clé/valeur de spécifications techniques.
          additionalProperties: true
        availability:
          $ref: "#/components/schemas/Availability"
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        is_featured:
          type: boolean
        is_active:
          type: boolean
        category_id:
          type: string
          format: uuid
          description: UUID `public.categories.id`.

    ProductRow:
      type: object
      description: |
        Ligne `public.products` retournée par
        `admin_update_product` (RETURNING).
      properties:
        id:           { type: string, format: uuid }
        category_id:  { type: string, format: uuid }
        slug:         { type: string }
        name:         { $ref: "#/components/schemas/JsonbI18n" }
        description:  { $ref: "#/components/schemas/JsonbI18n" }
        specs:
          type: object
          additionalProperties: true
        availability: { $ref: "#/components/schemas/Availability" }
        priority:     { type: integer }
        is_featured:  { type: boolean }
        is_active:    { type: boolean }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }
